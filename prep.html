const questions = [
/* ================================================================
   L1 — BIG DATA INTRODUCTION
================================================================ */
// MCQ
{ lec:"L1", type:"MCQ", q:"What are the 5 V's of Big Data?",
  options:["Volume, Velocity, Variety, Veracity, Value","Volume, Velocity, Visibility, Variation, Value","Volume, Variety, Veracity, Visualization, Validity","Volume, Value, Velocity, Vision, Variation"],
  answer:0, exp:"The 5 Vs = Volume (size), Velocity (speed), Variety (formats), Veracity (accuracy), Value (insights)." },

{ lec:"L1", type:"MCQ", q:"Which V refers to BUSINESS INSIGHTS derived from data?",
  options:["Volume","Veracity","Value","Variety"], answer:2,
  exp:"Value = the business insights that can be extracted from data." },

{ lec:"L1", type:"MCQ", q:"Which V refers to MULTIPLE data formats and sources?",
  options:["Variety","Volume","Velocity","Veracity"], answer:0,
  exp:"Variety = multiple formats (structured, semi, unstructured) and sources." },

{ lec:"L1", type:"MCQ", q:"Data that is highly organized with rows and columns is:",
  options:["Unstructured","Semi-Structured","Structured","Hybrid"], answer:2,
  exp:"Structured: fixed schema, rows & columns. Examples: bank transactions, ERP." },

{ lec:"L1", type:"MCQ", q:"Web/application logs are typically classified as:",
  options:["Structured","Semi-Structured","Unstructured","Binary"], answer:1,
  exp:"Web/app logs are semi-structured. They have flexible structure (often JSON/XML)." },

{ lec:"L1", type:"MCQ", q:"Schema-on-Read is used in which approach?",
  options:["Data Warehouse","Data Lake","RDBMS","Schema-defined storage"], answer:1,
  exp:"Schema-on-Read → Data Lake. Schema-on-Write → Data Warehouse." },

{ lec:"L1", type:"MCQ", q:"In Schema-on-Write, when is the schema defined?",
  options:["At query time","Before ingestion","Never","Only when accessed"], answer:1,
  exp:"Schema-on-Write: schema defined before data is stored (used in traditional analytics)." },

{ lec:"L1", type:"MCQ", q:"Stream processing focuses on:",
  options:["Throughput","Immediate response","Storage","Compression"], answer:1,
  exp:"Stream = immediate response. Batch = throughput." },

{ lec:"L1", type:"MCQ", q:"A platform processes 10,000 events/sec on one node. To reach 35,000 events/sec, vertical scaling reaches 18,000. Horizontal needs how many 10,000-event nodes?",
  options:["3","4","5","6"], answer:1,
  exp:"4 nodes × 10,000 = 40,000 events/sec ≥ 35,000 (vertical insufficient at 18,000)." },

{ lec:"L1", type:"MCQ", q:"To guarantee 30,000 events/sec even if 1 node fails (each node = 10,000), minimum nodes?",
  options:["3","4","5","6"], answer:1,
  exp:"3 active = 30,000 + 1 backup = 4 nodes minimum." },

{ lec:"L1", type:"MCQ", q:"Which load balancing algorithm uses 'hash of client IP → server'?",
  options:["Round Robin","Least Connections","Resource-Based","IP Hash"], answer:3,
  exp:"IP Hash maps client IP to a fixed server for session affinity." },

{ lec:"L1", type:"MCQ", q:"Which is NOT something Big Data load balancing distributes?",
  options:["Data (storage)","Computation (processing)","Resources (infrastructure)","Application binaries"], answer:3,
  exp:"In Big Data, we balance Data, Computation, and Resources — NOT app binaries." },

{ lec:"L1", type:"MCQ", q:"Which is NOT a NoSQL category?",
  options:["Key-Value","Document","Column-Family","Schema-Strict"], answer:3,
  exp:"NoSQL types: Key-Value, Document, Column-Family, Graph. 'Schema-Strict' is not a NoSQL category." },

{ lec:"L1", type:"MCQ", q:"Hierarchical JSON data is best stored in which NoSQL type?",
  options:["Key-Value","Document","Column-Family","Graph"], answer:1,
  exp:"Document NoSQL stores JSON/XML with flexible, hierarchical structure." },

{ lec:"L1", type:"MCQ", q:"Fraud detection and social networks fit best with:",
  options:["Key-Value","Document","Column-Family","Graph"], answer:3,
  exp:"Graph NoSQL is best for relationship-heavy data (fraud, social networks)." },

{ lec:"L1", type:"MCQ", q:"In Master-Slave replication, who handles writes?",
  options:["All nodes","Only the Master","Only Slaves","Round Robin between nodes"], answer:1,
  exp:"Master handles writes; slaves handle reads. Best for read-intensive workloads." },

{ lec:"L1", type:"MCQ", q:"6 TB dataset sharded across 6 nodes, replication factor 2 → total storage?",
  options:["6 TB","12 TB","24 TB","36 TB"], answer:1,
  exp:"6 × 2 = 12 TB total. Each node stores 12/6 = 2 TB." },

{ lec:"L1", type:"MCQ", q:"CAP theorem: in distributed systems, which property is NON-negotiable?",
  options:["Consistency","Availability","Partition Tolerance","All three"], answer:2,
  exp:"P is non-negotiable in distributed systems → choice is CP vs AP." },

{ lec:"L1", type:"MCQ", q:"Banking systems are typically:",
  options:["AP (Available + Partition tolerant)","CP (Consistent + Partition tolerant)","CA only","AP with eventual consistency"], answer:1,
  exp:"Banking → CP. Better to be correct than available; reject transactions during partitions." },

{ lec:"L1", type:"MCQ", q:"During a 5-second network partition with 10,000 req/sec in CP mode, how many requests are rejected?",
  options:["10,000","25,000","50,000","100,000"], answer:2,
  exp:"10,000 × 5 = 50,000 rejected (blocks/rejects to preserve consistency)." },

{ lec:"L1", type:"MCQ", q:"Data locality means:",
  options:["Storing all data in one location","Moving computation to where data is stored","Moving data to compute","Encrypting data locally"], answer:1,
  exp:"Data locality = move computation to the data; reduces network traffic. Local reads ~10× faster." },

{ lec:"L1", type:"MCQ", q:"Round Robin LB Example: 4 nodes (each 5,000 evt/sec), input 16,000 evt/sec. Per node?",
  options:["4,000 evt/sec — no overload","4,500 — slight overload","5,000 — saturated","8,000 — overloaded"], answer:0,
  exp:"Round Robin: 16,000 ÷ 4 = 4,000 per node. Each node has capacity 5,000, so NO overload. If rate becomes 22,000 → 5,500 per node > 5,000 capacity = overloaded." },

// True/False
{ lec:"L1", type:"TF", q:"True or False: Big Data is defined ONLY by the massive size of data.",
  answer:"FALSE", exp:"Big Data is also defined by COMPLEXITY and the SPEED at which it is generated and processed — not just size." },

{ lec:"L1", type:"TF", q:"True or False: Vertical scaling adds many cheap servers to a cluster.",
  answer:"FALSE", exp:"Vertical scaling = upgrade ONE server (more CPU/RAM). Horizontal scaling adds many cheap servers." },

{ lec:"L1", type:"TF", q:"True or False: A distributed system can guarantee Consistency, Availability, and Partition Tolerance all simultaneously.",
  answer:"FALSE", exp:"CAP theorem: at most 2 of 3. Since P is non-negotiable, choose between CP and AP." },

{ lec:"L1", type:"TF", q:"True or False: HDFS and GFS are examples of distributed file systems.",
  answer:"TRUE", exp:"Google File System (GFS) and Hadoop Distributed File System (HDFS) are both distributed file systems." },

{ lec:"L1", type:"TF", q:"True or False: In-memory storage is mainly used for batch processing.",
  answer:"FALSE", exp:"In-memory storage is for real-time/streaming analytics. On-disk is for batch." },

{ lec:"L1", type:"TF", q:"True or False: Horizontal scaling combined with load balancing prevents node bottlenecks.",
  answer:"TRUE", exp:"Horizontal scaling adds servers; load balancing distributes work so none becomes a bottleneck." },

// Explain
{ lec:"L1", type:"EXPLAIN", q:"Explain what Big Data is and why traditional systems fail.",
  answer:"Big Data refers to huge AND complex datasets that traditional tools find difficult to process. It's defined by 5 V's: Volume, Velocity, Variety, Veracity, Value. Traditional systems fail because they cannot handle all 5 dimensions together — they're built for structured data in relational databases, processed centrally, with limited scalability.\n\nBig Data solutions provide tools, methodologies, and technologies to capture, store, search, and analyze data in seconds to find relationships and insights." },

{ lec:"L1", type:"EXPLAIN", q:"Explain the Schema-on-Read approach and when to use it.",
  answer:"Schema-on-Read:\n• Data is stored WITHOUT defining a schema upfront.\n• Schema is applied WHEN data is read for analysis (query time).\n• Flow: Raw Data → Data Lake → Schema → Analytics.\n• 'Store everything first, think later.'\n\nUse it when:\n• Working with unstructured/semi-structured data\n• Data requirements may evolve\n• You need flexibility and massive volumes at low cost\n• Building data lakes for diverse data types\n\nHigher compute cost but maximum flexibility." },

{ lec:"L1", type:"EXPLAIN", q:"Explain the 5-layer Big Data Ecosystem Architecture.",
  answer:"L1 — Data Source Layer: identify origin, type, format; decide push vs pull; data volume\nL2 — Data Ingestion Layer: ETL, preprocessing, real-time or batch ingestion\nL3 — Data Storage Layer: store reliably (HDFS, HBase, Cassandra, MongoDB); fault tolerance\nL4 — Data Processing Layer: MapReduce, Hive, Pig, Spark, Spark Streaming; batch/real-time/hybrid\nL5 — Data Consumption Layer: reporting, visualization, real-time/near real-time analytics, export to cloud\n\nData flows top-down: Sources → Ingestion → Storage → Processing → Consumption." },

{ lec:"L1", type:"EXPLAIN", q:"Explain CAP Theorem with examples of CP and AP systems.",
  answer:"CAP Theorem: A distributed system can guarantee AT MOST 2 of 3:\n• Consistency (C): every node returns same most-recent data\n• Availability (A): every request gets success/failure response\n• Partition Tolerance (P): system operates despite network outages\n\nSince distributed systems must tolerate partitions, P is non-negotiable. Choice = CP vs AP.\n\nCP Example (Banking): During network partition, system REJECTS requests to ensure consistency. Better correct than available. Example: 10,000 req/sec × 5 sec partition = 50,000 rejected requests.\n\nAP Example: During partition, system stays available but may return stale data — like social media feeds. Better available than correct (temporarily)." },

{ lec:"L1", type:"EXPLAIN", q:"Explain Data Locality and why it matters in Big Data.",
  answer:"Data Locality = moving computation to where the data is stored, instead of moving large amounts of data across the network.\n\nWhy it matters:\n• Network is the slowest resource in a cluster\n• Moving computation is cheaper than moving data\n• Local reads can be ~10× faster than remote reads\n\nHow it works: job schedulers place tasks on DataNodes that already hold the required data blocks.\n\nBenefits: faster job execution, reduced network traffic, better cluster utilization. It's a core optimization in HDFS/YARN/Spark to achieve high performance at scale." },

  answer:[
    ["Aspect","Structured","Semi-Structured","Unstructured"],
    ["Schema","Fixed, defined BEFORE insertion","Partial/flexible, self-describing, applied at READ time","No predefined structure"],

    ["Modeling Effort","Low initially, more during analysis","High upfront"],

    ["Best Use","Big Data analytics, exploratory","BI, reporting, traditional analytics"],

    ["Aspect","Traditional","Big Data"],
    ["Data Type","Structured only","Structured + Semi + Unstructured"],

    ["Tools","Mainly SQL","ML, data mining, AI"],
    ["Sources","Transactional systems","Social media, sensors, logs"],
    ["Processing","Centralized","Distributed"],
    ["Modeling","Schema-on-Write","Schema-on-Read"]
  ] },

{ lec:"L1", type:"DIFF", q:"Compare Vertical Scaling vs Horizontal Scaling.",

    ["Aspect","Vertical (Traditional)","Horizontal (Big Data)"],

    ["Combined","Often used together: shard then replicate each shard","-"]

{ lec:"L1", type:"DIFF", q:"Compare Master-Slave vs Peer-to-Peer Replication.",

    ["Speed","Slower","Much faster"],
    ["Persistence","Persists after crash","May lose data unless backed by disk"],
    ["Cost","Cheaper","More expensive"],
    ["Use Case","Batch, historical, long-term","Real-time/streaming analytics"],

  ] },

// EXPLAIN
{ lec:"L2H", type:"EXPLAIN", q:"Explain why HDFS uses LARGE block sizes (128 MB) by default.",
  answer:"HDFS uses large blocks (128 MB default) for two main reasons:\n\n1. REDUCE DISK SEEK OVERHEAD: Larger blocks mean fewer seeks per file, since the disk arm moves less. Most time is spent reading data, not positioning.\n\n2. MAXIMIZE DATA TRANSFER THROUGHPUT: Designed for high-throughput batch processing.\n\nTrade-off:\n• TOO LARGE → fewer blocks → fewer tasks → idle cluster nodes → slow job\n• TOO SMALL → too many tasks → high scheduling overhead → task startup overhead\n\nExample (1 TB, 100 nodes):\n• 128 MB → ~8,000 blocks → ~8,000 parallel tasks → good\n• 10 GB → 100 blocks → 100 tasks → poor parallelism\n\nLarge blocks must still allow enough parallelism for MapReduce/Spark." },

{ lec:"L2H", type:"EXPLAIN", q:"Explain the role and benefits of Block Abstraction in HDFS.",
  answer:"Block Abstraction is the architectural foundation enabling HDFS to achieve scalability, manageability, and fault tolerance.\n\nThe benefits:\n\n1. SUPPORTS MASSIVE FILES: Files split into independent blocks across many disks/machines → file sizes can exceed single-disk capacity.\n\n2. SIMPLIFIES STORAGE MANAGEMENT: Uniform block sizes simplify data placement, load balancing, replication, and recovery. NameNode manages metadata separately from data.\n\n3. ENABLES FAULT TOLERANCE: Blocks are replicated across multiple DataNodes. Failures are handled without losing data — if one DataNode fails, replicas on others remain available." },

{ lec:"L2H", type:"EXPLAIN", q:"Explain why the Secondary NameNode is needed (NOT a backup).",
  answer:"Why it exists:\n• NameNode stores file system metadata in two files: FsImage (snapshot) + Edit Log (changes).\n• Since NameNode runs continuously, Edit Log keeps growing.\n• Growing log causes: slow NameNode restart, high memory/processing overhead during recovery.\n\nWhat Secondary NameNode does:\n• Periodically COPIES FsImage and Edit Logs from NN.\n• MERGES Edit Logs into FsImage (checkpointing).\n• Creates a new updated FsImage.\n• Sends updated FsImage BACK to NameNode.\n\nKey point: Secondary NN does NOT take over if NN fails. It only HELPS recovery by providing a recent checkpoint. For automatic failover, use HDFS HA (Active/Standby)." },

{ lec:"L2H", type:"EXPLAIN", q:"Explain Heartbeats and Block Reports in HDFS — how does the NameNode know a node failed?",
  answer:"HEARTBEATS:\n• Each DataNode sends regular heartbeats to NameNode (~every 3 seconds).\n• Acts as an 'I am alive' signal.\n• NameNode records the last heartbeat time per DataNode.\n• If no heartbeat within timeout → DataNode marked DEAD.\n• Once marked dead, NameNode initiates replication of that node's blocks to other DataNodes to maintain replication factor.\n\nBLOCK REPORTS:\n• DataNodes periodically send block reports = complete list of all blocks stored on them.\n• Helps NameNode maintain accurate map of block locations across cluster.\n• Used to: track block locations, detect under-replication.\n• Failed blocks are automatically re-replicated.\n\nTogether: heartbeats detect node failures; block reports keep the block→location map current." },

{ lec:"L2H", type:"EXPLAIN", q:"Explain Erasure Coding (EC) and how it differs from replication.",
  answer:"Erasure Coding (introduced in Hadoop 3):\n• Provides fault tolerance like replication but with MUCH LESS storage overhead.\n• Instead of storing many full replicas, stores DATA blocks + PARITY blocks (RAID-like encoding).\n\nPolicy notation RS-k-m: k = data blocks, m = parity blocks.\n• RS-6-3 = 6 data + 3 parity = 9 total (≈50% overhead).\n• Compare to RF=3: 3× storage (200% overhead).\n\nHow it works:\n1. STRIPE: file split into data blocks/stripes.\n2. ENCODE: parity blocks computed from data via encoding (Reed-Solomon).\n3. DISTRIBUTE: all blocks spread across DataNodes and racks.\n4. RECONSTRUCT: if blocks fail, decode using surviving data + parity.\n\nBest for WARM/COLD data (less frequently accessed). For HOT data, replication may still be preferred due to faster reads (no decoding)." },

{ lec:"L2H", type:"EXPLAIN", q:"Explain the HDFS Balancer — why is it needed and how does it work?",
  answer:"Why needed:\n• HDFS clusters grow over time. When new DataNodes are added:\n  - Existing nodes already store large amounts of data\n  - New nodes start completely empty\n  - HDFS does NOT automatically move old data to new nodes\n• This creates DATA SKEW: some nodes 90% full, others 10% full.\n• Jobs become slower: busy nodes serve most reads, their network/disks overload.\n\nHow the Balancer works:\n• Admin background tool.\n• Monitors disk usage across DataNodes.\n• Identifies imbalances:\n  - Over-utilized nodes (too full)\n  - Under-utilized nodes (too empty)\n• Gradually moves blocks from full to empty nodes.\n\nKey properties:\n• Balancing happens WITHOUT downtime.\n• Data integrity and replication rules preserved.\n• Movement is THROTTLED to avoid network congestion.\n• Uses a THRESHOLD (e.g., 10% deviation from cluster average)." },

// SCENARIO
{ lec:"L2H", type:"SCENARIO", q:"Scenario: Dataset has 2M log files (256 MB each), 1M images (300 MB each), 500K data files (512 MB each). Default block = 128 MB, metadata = 150 bytes/block. Calculate: (a) blocks per file type, (b) total blocks before adding small files, (c) effect of adding 3M small files of 1 MB each.",
  answer:"BLOCKS PER FILE TYPE:\n• Log file (256 MB) → 256/128 = 2 blocks per file\n• Image file (300 MB) → ⌈300/128⌉ = 3 blocks per file (236 MB unused space in last block but still 3 blocks)\n• Data file (512 MB) → 512/128 = 4 blocks per file\n\nTOTAL BLOCKS BEFORE SMALL FILES:\n• Logs: 2M × 2 = 4,000,000\n• Images: 1M × 3 = 3,000,000\n• Data: 500K × 4 = 2,000,000\n• TOTAL = 9,000,000 blocks\n• Metadata = 9,000,000 × 150 bytes = 1.35 GB on NameNode\n\nAFTER ADDING SMALL FILES:\n• 3M files × 1 MB each = 3M blocks (each 1 MB file = 1 block, even though much smaller than 128 MB)\n• New total = 9M + 3M = 12,000,000 blocks\n• Metadata = 12M × 150 bytes = 1.8 GB on NameNode\n\nIMPACT: Many small files dramatically increase NameNode memory load (+33%) without efficient storage use. The 'small files problem' overwhelms NameNode scalability." },

{ lec:"L2H", type:"SCENARIO", q:"Scenario: 3 DataNodes, 100 GB each. Used: Node1=90, Node2=60, Node3=50 GB. Balancer threshold=10%. Calculate: (a) usage %, (b) cluster average, (c) deviation, (d) unbalanced nodes, (e) balancing action.",
  answer:"(a) USAGE %:\n• Node1: 90/100 = 90%\n• Node2: 60/100 = 60%\n• Node3: 50/100 = 50%\n\n(b) CLUSTER AVERAGE: (90+60+50)/3 = 200/3 = 66.67%\n\n(c) DEVIATION (from 66.67%):\n• Node1: 90 - 66.67 = +23.33%\n• Node2: 60 - 66.67 = -6.67%\n• Node3: 50 - 66.67 = -16.67%\n\n(d) UNBALANCED NODES (|deviation| > 10%):\n• Node1: 23.33% > 10% → OVER-utilized\n• Node2: 6.67% < 10% → within threshold (balanced)\n• Node3: 16.67% > 10% → UNDER-utilized\n\n(e) BALANCING ACTION:\n• Node1 SENDS blocks (it's over-utilized)\n• Node3 RECEIVES blocks (it's under-utilized)\n• Node2 stays (within threshold)\n• Target: bring all within 10% of 66.67% (i.e., between 56.67% and 76.67%)" },

{ lec:"L2H", type:"SCENARIO", q:"Scenario: Cluster has 3 racks × 5 DataNodes = 15 nodes. Block size = 128 MB, RF=3. Upload 2 TB dataset. Calculate: (a) # blocks, (b) physical storage, (c) replica placement.",
  answer:"(a) # BLOCKS: 2 TB = 2,097,152 MB ÷ 128 MB = 16,384 blocks (approximate using 2*1024*1024/128 = 16,384).\n\n(b) PHYSICAL STORAGE WITH REPLICATION:\n• 16,384 blocks × 3 replicas × 128 MB = 6,291,456 MB ≈ 6 TB total storage.\n\n(c) REPLICA PLACEMENT (rack-aware, RF=3):\nFor each block:\n• 1st replica → local rack (e.g., Rack A, on a DataNode)\n• 2nd replica → ANOTHER DataNode on the SAME rack (Rack A, different node)\n• 3rd replica → a DIFFERENT rack (Rack B or C)\n\nThis ensures: fault tolerance at both NODE level (two replicas on same rack) AND RACK level (one replica on a different rack survives rack failure)." },

{ lec:"L2H", type:"SCENARIO", q:"Scenario: 900 TB log data. Compare storage: (a) Replication RF=3, (b) Erasure Coding RS-6-3, (c) savings.",
  answer:"(a) REPLICATION RF=3:\n• Total = 900 × 3 = 2,700 TB physical storage.\n\n(b) ERASURE CODING RS-6-3:\n• Ratio = (6+3)/6 = 9/6 = 1.5\n• Total = 900 × 1.5 = 1,350 TB physical storage.\n\n(c) SAVINGS:\n• Saved = 2,700 - 1,350 = 1,350 TB\n• 50% storage saved by using EC vs replication.\n\nBest for warm/cold log data where read latency is less critical." },

// EXPLAIN
{ lec:"L2M", type:"EXPLAIN", q:"Explain the core idea of MapReduce and what the framework handles vs the programmer.",
  answer:"Core idea: MOVE the burden of managing distributed systems FROM the developer TO the library.\n\nThe programmer expresses computation as just two functions (Map and Reduce), and the framework handles everything else.\n\nProgrammer responsibility:\n• Map logic\n• Reduce logic\n• Combiner (optional)\n\nFramework responsibility:\n• Parallel execution\n• Data partitioning\n• Shuffle & sort\n• Fault tolerance\n• Worker coordination\n\nThis simple abstraction hides the 'messy details' of parallelization, fault tolerance, data distribution, and load balancing — allowing programmers without parallel systems experience to utilize large-scale distributed resources." },

{ lec:"L2M", type:"EXPLAIN", q:"Explain the role of the Combiner and when it can be safely used.",
  answer:"Combiner = mini-Reducer that performs PARTIAL MERGING of intermediate data ON THE MAP MACHINE before the data is sent over the network.\n\nPURPOSE: Reduce network traffic during shuffle (saves bandwidth).\n\nKEY RULES:\n• Optional (not required for correctness)\n• Must use the SAME LOGIC as Reduce\n• Runs LOCALLY on mapper output\n\nSAFETY CONDITIONS:\nCombiner works ONLY when Reduce is ASSOCIATIVE AND COMMUTATIVE.\n\nWorks safely:\n• Sum, Count, Min, Max\n\nDoes NOT safely work:\n• Average (unless rewritten to track sum + count separately)\n• Median\n• Order-dependent operations\n\nExample: in WordCount, Mapper Split 1 outputs (big,1),(big,1) → Combiner outputs (big,2) → less data transferred to Reducer." },

{ lec:"L2M", type:"EXPLAIN", q:"Explain the Partitioner, how it works, and the Data Skew problem.",
  answer:"PARTITIONER: After the Map phase, the Partitioner determines WHICH REDUCER will receive each key.\n\nDEFAULT BEHAVIOR (Hash Partitioner):\n  hash(key) % number_of_reducers\n\nUSE: Needed when working with multiple reducers to ensure load balancing.\n\nDATA SKEW PROBLEM:\n• If one key appears very frequently → it ALL goes to one reducer (because hash is deterministic).\n• That one reducer becomes overloaded.\n• Job becomes slow — others finish quickly while one struggles.\n\nMITIGATION STRATEGIES:\n• Key Salting: split heavy keys (low complexity). Good for WordCount skew.\n• Range Partition: by key range (medium complexity). Good for ordered data.\n• Frequency-Aware: manually assign heavy keys (high complexity). Used in production." },

{ lec:"L2M", type:"EXPLAIN", q:"Explain Shuffle & Sort phases — why are they important?",
  answer:"SHUFFLE PHASE (Data Transfer & Grouping):\n• Transfers intermediate (k,v) pairs from Mappers → Reducers.\n• Groups records by key — all values for the same key go to the same reducer.\n• PHYSICAL movement of data over the NETWORK.\n• Starts BEFORE all mappers finish (overlapping = better performance).\n• Most expensive phase (network + disk operations).\n\nSORT PHASE (Automatic Key Ordering):\n• Sorts intermediate keys BEFORE they reach the reducer.\n• Combines multiple sorted lists from Mappers into a single globally sorted stream per Reducer.\n• Ensures reducer receives data in SORTED KEY ORDER.\n• Groups identical keys together: K → [V1, V2, V3, ...].\n\nWHY IMPORTANT?\n• Enables EFFICIENT AGGREGATION: reducer doesn't have to search the whole dataset; identical keys are already adjacent.\n• Ensures DETERMINISTIC processing.\n• Makes REDUCER LOGIC SIMPLER." },

{ lec:"L2M", type:"EXPLAIN", q:"Explain WHY MapReduce is NOT suitable for iterative algorithms, real-time, or interactive queries.",
  answer:"MapReduce has a RIGID Map → Shuffle → Reduce structure.\n\n1. ITERATIVE ALGORITHMS (ML, Graph):\n• Each iteration writes results to HDFS and reads them back next iteration.\n• Reloads data EVERY pass → expensive disk I/O.\n• 100 iterations = 100× full disk read/write cycle.\n• Spark keeps data in memory across iterations → much better.\n\n2. REAL-TIME / LOW-LATENCY PROCESSING:\n• MR is a HIGH-LATENCY model (jobs take minutes).\n• Cannot handle streaming data continuously.\n• Use Spark Streaming, Flink, Kafka instead.\n\n3. INTERACTIVE QUERIES:\n• High latency → minutes per query.\n• Use Hive/Presto for SQL.\n• Use Spark for general interactive.\n\n4. HIGHLY SEQUENTIAL/DEPENDENT TASKS:\n• Tasks needing chain-of-thought style processing don't fit the rigid pipeline.\n\nGeneral rule: If many iterations or real-time responses are needed → MapReduce is the WRONG tool." },

{ lec:"L2M", type:"SCENARIO", q:"Scenario: Natural join R(A,B) ⋈ S(B,C) using MapReduce. Describe Map and Reduce tasks.",
  answer:"MAP TASKS (turn each tuple into key-value pair keyed by join column B):\n• For each R(a,b) → emit (b, (a, R))  — key=B, value=(A, source-tag R)\n• For each S(b,c) → emit (b, (c, S))  — key=B, value=(C, source-tag S)\n\nSHUFFLE & SORT: pairs with same b go to same reducer.\n\nREDUCE TASK (matches by B):\n• For each B value, the reducer gets a list of pairs.\n• MATCHES all (a, R) entries with all (c, S) entries.\n• OUTPUTS (a, b, c) — the joined tuple.\n\nNote: the 'source tag' (R or S) lets the reducer know which side each value came from, since they share the same key b. The join is the cartesian product across all matching pairs for each b." },

{ lec:"L2M", type:"SCENARIO", q:"Scenario: Counting 5-word sequences in a corpus of documents. Describe Map, Shuffle, Reduce phases.",
  answer:"5-WORD SEQUENCE (5-gram) = any 5 consecutive words.\nExample sentence 'The quick brown fox jumps over the lazy dog':\n  • 'The quick brown fox jumps'\n  • 'quick brown fox jumps over'\n  • 'brown fox jumps over the'\n  • 'fox jumps over the lazy'\n  • 'jumps over the lazy dog'\n(5 sequences from 9 words.)\n\nMAP PHASE:\n• Extract ALL 5-word sequences from each document.\n• Emit (sequence, 1) for each occurrence.\n\nSHUFFLE & SORT:\n• Group all emitted pairs by sequence.\n• Prepare for aggregation.\n\nREDUCE PHASE:\n• Sum the counts for each unique sequence.\n• Output (sequence, total_count)." },

// EXPLAIN
{ lec:"L5", type:"EXPLAIN", q:"Explain why YARN was needed — what were Hadoop 1's limitations?",
  answer:"Hadoop 1 LIMITATIONS:\n\n1. SINGLE POINT OF FAILURE: JobTracker managed all jobs. If it failed, ALL running jobs lost; cluster couldn't accept new jobs.\n\n2. RIGID PROCESSING: Only MapReduce supported. Blocked using modern engines like Spark.\n\n3. OVERLOADED ARCHITECTURE: JobTracker had to manage BOTH:\n   - Resource tracking (node capacity)\n   - Job execution (scheduling, monitoring tasks)\n   This single component became an overwhelming bottleneck as clusters grew (bottleneck at ~4,000 nodes).\n\n4. INEFFICIENT RESOURCE USE: MRv1 used a rigid 'slot' system — each node had fixed map and reduce slots. If all map slots busy but reduce free (or vice versa), resources sat idle → poor utilization.\n\nYARN's SOLUTION:\n• Splits resource management from job scheduling into separate daemons.\n• Introduces dynamic containers (CPU/RAM) instead of fixed slots.\n• Adds HA (Active/Standby RM).\n• Supports multi-tenancy (Spark, Flink, MR, Tez, etc.)." },

{ lec:"L5", type:"EXPLAIN", q:"Explain the role and responsibilities of each YARN component.",
  answer:"1. CLIENT:\n• Submits a job (Spark/MR) to YARN.\n• Talks to RM to request execution.\n• Monitors job status; interacts with AM for progress.\n\n2. RESOURCE MANAGER (RM) — Master, Cluster Boss:\n• Arbitrates resources among all applications.\n• Two sub-components:\n  - SCHEDULER: pure scheduler (Capacity, Fair).\n  - APPLICATION MANAGER: accepts submissions, starts first container for AM, restarts AM on failure.\n\n3. NODE MANAGER (NM) — Slave, Building Supervisor:\n• Runs on every machine.\n• Registers with RM, sends heartbeats.\n• Tracks CPU/memory/disk usage.\n• Creates, launches, kills containers as directed.\n\n4. APPLICATION MASTER (AM) — Job-specific Manager:\n• ONE per application.\n• Negotiates containers from RM.\n• Schedules and coordinates task execution.\n• Monitors tasks, handles failures.\n• Launches containers via Container Launch Context (CLC).\n\n5. CONTAINER — Logical resource bundle:\n• RAM + CPU cores + disk on a single node.\n• Invoked by CLC.\n• Provides isolation between applications." },

{ lec:"L5", type:"EXPLAIN", q:"Explain Container Launch Context (CLC) and the Resource Request.",
  answer:"RESOURCE REQUEST (AM → RM Scheduler):\nThe AM doesn't just ask for 'help' — it sends a formal Resource Request.\nComponents:\n• RESOURCE NAME: specific Hostname, Rackname, or * (anywhere).\n• PRIORITY: rank tasks within the same job.\n• CAPABILITY: specific MB of RAM and number of cores.\n\nCONTAINER LAUNCH CONTEXT (CLC) (AM → NM):\nOnce a container is granted, the AM sends a CLC to the Node Manager.\nIncludes:\n• Environment variables\n• Dependencies (JAR files, scripts)\n• Security tokens\n\nFlow: AM negotiates → RM allocates a container → AM sends CLC to NM → NM launches the container with all needed context." },

{ lec:"L5", type:"EXPLAIN", q:"Explain ZooKeeper's role in YARN.",
  answer:"ZooKeeper provides the critical backbone making YARN reliable and fault-tolerant.\n\n3 KEY ROLES:\n\n1. LEADER ELECTION (RM HA):\n• YARN's RM can have multiple instances (Active & Standby).\n• ZooKeeper manages the election process — ensures only ONE Active RM runs.\n• If Active RM fails, ZK automatically promotes a Standby.\n\n2. STATE STORAGE:\n• Active RM writes application state and metadata to ZooKeeper.\n• If failover occurs, the new Active RM READS this data from ZK to recover running applications WITHOUT DATA LOSS.\n\n3. CLUSTER COORDINATION:\n• Stores configuration information.\n• Helps manage the health of nodes in the YARN architecture." },

{ lec:"L5", type:"SCENARIO", q:"Scenario: A user submits a Spark job to YARN. Walk through what happens from submission to completion.",
  answer:"1. Client submits Spark job to YARN's Resource Manager.\n2. RM's Application Manager allocates a container on a Node Manager and starts the Spark Application Master (driver) inside it.\n3. Spark AM registers with the RM.\n4. Spark AM sends a Resource Request to the RM Scheduler asking for containers (RAM/CPU) with locality preferences (near data blocks in HDFS).\n5. RM Scheduler grants containers based on Capacity/Fair Scheduler policies. AM receives container allocations.\n6. AM sends Container Launch Context (CLC) to the relevant Node Managers — includes env vars, dependencies (Spark JARs), security tokens.\n7. NMs launch Spark Executors inside containers. Executors run tasks in parallel, store RDDs in memory, handle shuffle.\n8. AM monitors task progress, handles failures (retries up to 4 attempts per container).\n9. Client may check status via RM or AM directly.\n10. When all tasks complete, Spark AM unregisters with RM. Containers released. Logs aggregated to HDFS (centralized debugging)." },

// EXPLAIN
{ lec:"L7", type:"EXPLAIN", q:"Explain what an RDD is and its three pillars.",
  answer:"RDD = Resilient Distributed Dataset — the fundamental data abstraction in Spark.\n\nIt represents a DISTRIBUTED COLLECTION OF ELEMENTS that can be PROCESSED IN PARALLEL across a cluster. An RDD is not stored as a single contiguous file — it's divided into multiple PARTITIONS.\n\nThree Pillars:\n\n1. RESILIENT: via a LINEAGE GRAPH (DAG). Spark 'remembers' the steps (transformations) used to create an RDD. If a partition is lost, it can be MATHEMATICALLY RECOMPUTED using its lineage. No need to copy data — just replay the transformations.\n\n2. DISTRIBUTED: RDD is automatically split into PARTITIONS distributed across different nodes in the cluster.\n\n3. DATASETS: a generic container for any type of Scala, Java, or Python object.\n\nAdditional Property — IMMUTABLE: Once created, RDD cannot be changed. Modification creates a new RDD (preserves predictability, prevents race conditions, enables lineage tracking)." },

{ lec:"L7", type:"EXPLAIN", q:"Explain Lazy Execution in Spark and why it's important.",
  answer:"Main idea: Nothing runs until an ACTION is called.\n\nHow it works:\n• When you write transformations in Spark, it does NOT execute them immediately.\n• Instead, Spark builds a LOGICAL EXECUTION PLAN internally.\n• It records all transformations you want to perform on the data WITHOUT actually computing them yet.\n• When an Action (collect, count, save) is finally called → Spark executes the plan.\n\nWhy important?\n\n1. OPTIMIZATION: Spark can analyze the WHOLE logical plan before executing anything. It can:\n  - Combine transformations\n  - Eliminate unnecessary steps\n  - Choose the most efficient execution strategy\n\n2. EFFICIENCY: Avoids unnecessary computations. If some data is never used in an action, Spark never computes it — saving resources.\n\n3. FAULT TOLERANCE: Spark can RE-COMPUTE ONLY THE REQUIRED PARTITIONS in case of failures, since it knows the full lineage of operations." },

{ lec:"L7", type:"EXPLAIN", q:"Explain the DAG Execution Model in Spark.",
  answer:"DAG = Directed Acyclic Graph. Spark uses it to represent data processing workflow and transformations. Allows optimization of complex chains of operations.\n\nThe DAG execution model is CREATED WHEN AN ACTION IS CALLED.\n\nFlow:\n1. User writes transformations (lazy) → Spark builds LINEAGE GRAPH = logical plan.\n2. When an Action is called:\n   • A JOB is created.\n   • DAG Scheduler splits the job into STAGES based on SHUFFLE BOUNDARIES.\n   • Each Stage is divided into multiple TASKS.\n   • Tasks are distributed to EXECUTORS.\n\nKey terms:\n• Lineage graph → Logical plan\n• DAG Execution Model → Physical plan\n\nSchedulers:\n• DAG Scheduler: breaks the complex DAG into Stages.\n• Task Scheduler: assigns parallel Tasks to Executors per stage." },

{ lec:"L7", type:"EXPLAIN", q:"Explain the Spark Architecture's main components.",
  answer:"A Spark application has a CENTRAL COORDINATOR (Driver) and multiple WORKERS (Executors) distributed across the cluster.\n\n1. DRIVER PROGRAM (Brain of Spark):\n• Runs the main application.\n• Creates execution plan (DAG).\n• Divides work into stages & tasks.\n• Schedules and monitors execution.\n\n2. CLUSTER MANAGER (Resource Manager):\n• Allocates CPU & memory.\n• Decides which nodes run the job.\n• Examples: YARN, Mesos, Standalone, Kubernetes.\n\n3. WORKER NODES:\n• Machines in the cluster.\n• Host Executors.\n\n4. EXECUTORS (Workers):\n• Execute tasks in parallel.\n• Store data in memory (RDD caching).\n• Handle shuffle operations.\n• Send results back to Driver." },

{ lec:"L7", type:"EXPLAIN", q:"Explain WHY Spark is faster than Hadoop MapReduce (give 4 reasons).",
  answer:"1. IN-MEMORY PROCESSING:\n• Spark stores intermediate data in RAM.\n• Allows processing much faster than disk-based systems.\n• MapReduce writes ALL intermediate results to disk (HDFS).\n\n2. DAG OPTIMIZATION:\n• Spark does NOT execute operations immediately.\n• It builds a DAG and OPTIMIZES it before execution.\n• Can combine operations, eliminate redundancy, choose efficient plans.\n\n3. REDUCED DISK I/O:\n• Disk used only when data doesn't fit memory or during shuffle.\n• MapReduce writes between every Map and Reduce stage.\n\n4. BETTER TASK SCHEDULING:\n• Smart scheduling with data locality awareness.\n• Speculative execution for stragglers.\n\nResult: Up to 100× faster in memory, 10× faster on disk." },

// SCENARIO
{ lec:"L7", type:"SCENARIO", q:"Scenario: Log analysis use case — TBs of server logs in HDFS, need to detect errors quickly. Compare MapReduce vs Spark solutions.",
  answer:"MAPREDUCE SOLUTION:\n• Multiple jobs chained: each writes intermediate results to disk.\n• Slow due to repeated disk I/O.\n• Cannot easily iterate.\n• High latency.\n\nSPARK SOLUTION:\n• Load logs into RDD once (read from HDFS).\n• Apply filter transformations (e.g., filter for 'ERROR' lines) — lazy.\n• Cache the filtered RDD in memory.\n• Run multiple analyses (count by error type, group by hour, top hosts, etc.) — all using the cached RDD.\n• Each analysis reuses the in-memory data → no disk re-read.\n• Use DAG optimization for efficient plans.\n\nResult: Spark is significantly faster for this pattern (iterative + interactive queries on cached data). Up to 100× faster than MapReduce in memory." },

{ lec:"L7", type:"SCENARIO", q:"Scenario: You write rdd.map(...).filter(...).count(). When does each operation actually execute? Explain.",
  answer:"Step-by-step:\n\n1. rdd.map(...) — Transformation. Spark adds 'map' to the lineage. NO COMPUTATION HAPPENS YET. Returns a new RDD reference.\n\n2. .filter(...) — Transformation. Spark adds 'filter' after map in the lineage. STILL NO COMPUTATION. Returns yet another new RDD reference.\n\n3. .count() — ACTION. NOW Spark:\n   • Builds the DAG from the full lineage: source → map → filter → count\n   • DAG Scheduler analyzes: all narrow transformations (map, filter) — no shuffle — so just one stage.\n   • Task Scheduler creates one task per partition.\n   • Executors run tasks: load partition → apply map → apply filter → count locally.\n   • Local counts sent back to Driver.\n   • Driver aggregates → final count returned.\n\nKey insight: This is lazy execution — the entire pipeline (map + filter + count) executes in a single fused pass over each partition, not three separate passes. THIS is one major optimization Spark gains from laziness." },

{ lec:"L2H", type:"ARCH", q:"Describe the complete HDFS Architecture (master-worker design, components, communication).",
  answer:"HDFS = MASTER-WORKER architecture with 1 master (NameNode) and many workers (DataNodes).\n\nMASTER: NameNode (NN)\n• Manages filesystem namespace and metadata (dirs, permissions, file→block mapping).\n• Tracks which DataNodes store each block.\n• Coordinates client access; monitors DataNode health.\n• Stores: FsImage (snapshot) + Edit Log (recent changes).\n• Block locations rebuilt from DataNodes at startup.\n• Single point of failure (unless HA is enabled).\n\nWORKERS: DataNodes (DN)\n• Commodity hardware.\n• Store and serve actual data BLOCKS on local disks.\n• Handle read/write requests from clients.\n• Send heartbeats (~3 sec) and periodic block reports to NN.\n\nHELPER: Secondary NameNode\n• NOT a backup.\n• Periodically merges FsImage + Edit Log into new FsImage (checkpointing).\n• Sends updated FsImage back to NN.\n• Prevents Edit Log from growing too large.\n\nCOMMUNICATION:\n• Client → NN: metadata operations (file create/delete/open).\n• Client ↔ DN: direct data transfer (read/write).\n• DN → NN: heartbeats + block reports.\n• NN → DN: instructions (replicate, delete blocks).\n\nRELIABILITY:\n• Replication (default RF=3) with rack awareness.\n• Erasure Coding (Hadoop 3) for less overhead.\n• HDFS Federation for namespace scalability.\n• HDFS HA (Active + Standby NN) for fault tolerance." },

{ lec:"L5", type:"ARCH", q:"Describe the complete YARN Architecture.",
  answer:"YARN = MASTER-SLAVE architecture, separating resource management from job scheduling.\n\nMASTER: Resource Manager (RM) — Cluster boss.\nTwo sub-components:\n• SCHEDULER: pure scheduler. Allocates resources by capacity/queues (Capacity, Fair).\n• APPLICATION MANAGER: accepts submissions, negotiates first container for AM, restarts AM if it fails.\n\nSLAVE: Node Manager (NM) — Per-machine worker.\n• Runs on EVERY worker node.\n• Registers with RM, sends heartbeats.\n• Resource monitoring (CPU/memory/disk).\n• Container management (create, launch, kill).\n\nPER-JOB: Application Master (AM)\n• ONE per application.\n• Negotiates containers from RM (Resource Requests: name + priority + capability).\n• Schedules and coordinates task execution.\n• Monitors progress, handles failed tasks.\n• Launches containers via Container Launch Context (CLC).\n\nRESOURCE UNIT: Container\n• Logical bundle of RAM + CPU + disk on a single node.\n• Provides isolation between applications.\n• Invoked via CLC from AM.\n\nCLIENT: Job submitter.\n• Submits app to RM.\n• Monitors via RM or directly via AM.\n\nHA: ZooKeeper coordinates Active/Standby RM (leader election + state storage).\n\nMulti-tenancy: Spark, Flink, MR, Tez all run concurrently on same cluster." },

{ lec:"L7", type:"ARCH", q:"Describe the complete Spark Architecture and how it integrates with YARN.",
  answer:"SPARK ARCHITECTURE: A central coordinator (Driver) and many workers (Executors) distributed across the cluster.\n\nCOMPONENTS:\n\n1. DRIVER PROGRAM (Brain):\n• Runs main application.\n• Translates user code to logical plan.\n• Creates execution plan (DAG).\n• DAG Scheduler: breaks DAG into Stages (by shuffle boundaries).\n• Task Scheduler: assigns parallel Tasks to Executors.\n• Monitors progress.\n\n2. CLUSTER MANAGER:\n• Allocates CPU/memory.\n• Decides which nodes run the job.\n• Examples: YARN, Mesos, Standalone, Kubernetes.\n\n3. WORKER NODES:\n• Cluster machines that host Executors.\n\n4. EXECUTORS (Workers):\n• Execute tasks in parallel.\n• Store data in memory (RDD caching).\n• Handle shuffle operations.\n• Send results back to Driver.\n\nINTEGRATION WITH YARN:\n1. User submits Spark app → launches Driver.\n2. Driver negotiates with YARN's Resource Manager for resources.\n3. RM allocates a container on a Node Manager to start the Spark AM (which contains the Driver in cluster mode).\n4. Spark AM requests more containers for Executors.\n5. NMs launch Executor containers using Container Launch Context (CLC).\n6. Driver schedules tasks on Executors; Executors process data locally.\n7. Results aggregated by Driver.\n8. On completion, AM unregisters, containers released, logs aggregated to HDFS.\n\nKey: Spark abstractions (RDD + DAG) sit on top of YARN's resource scheduling." },

{ lec:"L2M", type:"ARCH", q:"Describe the MapReduce processing pipeline (full architecture).",
  answer:"FULL MAPREDUCE PIPELINE:\n\n1. INPUT FILES (in HDFS).\n\n2. INPUTSPLIT: Logical division of input data. 1 InputSplit → 1 Map task. Doesn't physically split file.\n\n3. RECORDREADER: Converts raw data to (key, value) records. Default: Key = byte offset, Value = line content. Feeds records to Mapper.\n\n4. MAP PHASE (Mapper): User-defined function. (k1, v1) → list(k2, v2). Keys need not be unique. Runs in parallel on TaskTrackers (MRv1) / Containers (YARN).\n\n5. COMBINER (optional, mini-Reducer):\n• On the map machine, BEFORE network.\n• Same logic as Reducer.\n• Reduces network traffic.\n• Safe only when Reduce is associative + commutative.\n\n6. PARTITIONER: Determines which Reducer gets each key. Default: hash(key) % num_reducers. Handles data skew via custom strategies (key salting, range, frequency-aware).\n\n7. SHUFFLE PHASE: Network transfer of intermediate (k, v) from Mappers to Reducers. Groups by key. Starts before all mappers finish (overlapping). Most expensive phase.\n\n8. SORT PHASE: Sorts intermediate keys before reaching reducer. Combines sorted lists into one sorted stream per Reducer. Groups identical keys.\n\n9. REDUCE PHASE (Reducer): User-defined function. (k2, list(v2)) → list(v3). Reducers run in parallel; default count = 1.\n\n10. RECORDWRITER (OutputFormat): Writes final output to HDFS. One output file per Reducer.\n\nFAULT TOLERANCE:\n• Task re-execution on failure.\n• Speculative execution for stragglers.\n• Built into model, not manual." },

{ lec:"L7", type:"EXPLAIN", q:"Explain the evolution of Big Data tools across the 3 eras (Hadoop → Spark → Kafka).",
  answer:"2003–2006 — HADOOP ERA (Storage Crisis):\n• Single machines couldn't store TBs/PBs of data.\n• Relational DBs struggled with unstructured data.\n• Solution: HDFS (distributed storage) + MapReduce (batch processing).\n• Key idea: 'Store everything first.'\n\n2009–2012 — SPARK ERA (Speed Crisis):\n• Disk-based MR was too slow.\n• Batch jobs took hours/days.\n• Solution: In-memory processing with Spark.\n• Key idea: 'Move compute to data and keep data in memory.'\n• Result: Up to 100× faster than MapReduce.\n\n2011–Present — KAFKA ERA (Integration Crisis):\n• Real-time data explosion (clicks, sensors, logs).\n• Systems couldn't talk to each other.\n• Solution: Streaming backbone (Kafka, Spark Streaming).\n• Key idea: 'Data is a continuous stream, not a static file.'\n• Shift: from batch files → live streams.\n\nKEY LESSON: One tool ≠ solves everything. Big Data is a STACK of tools, each for a certain problem. There is no 'best' tool — only the right tool for the job." },

{ lec:"L2M", type:"EXPLAIN", q:"Explain how Data Locality is achieved across HDFS, MapReduce, and YARN.",
  answer:"Data Locality = move computation to where the data is stored.\n\nHDFS (Storage):\n• Data is replicated across DataNodes with rack awareness.\n• NameNode knows which blocks are on which DataNodes.\n• Block caching keeps hot blocks in DataNode RAM.\n\nMAPREDUCE:\n• JobTracker (MRv1) schedules Map tasks on TaskTrackers that already hold the input data blocks.\n• Tries to assign each Map task to a node hosting the block.\n• If not possible, falls back to: same rack → different rack (with increased cost).\n\nYARN:\n• Application Master requests containers with locality preferences (specific node/rack).\n• Resource Manager uses scheduling DELAY: waits briefly for a node-local container before falling back to rack-local.\n• YARN communicates with HDFS to know where blocks are located.\n\nSPARK:\n• Task Scheduler is optimized to minimize data movement across the network.\n• Executors are placed near data partitions.\n\nWHY IT MATTERS:\n• Network is the slowest resource in a cluster.\n• Local reads ~10× faster than remote reads.\n• Reduces network traffic and improves cluster utilization." },

{ lec:"L7", type:"DIFF", q:"Compare fault tolerance mechanisms across HDFS, MapReduce, YARN, and Spark.",
  answer:[
    ["System","Failure Type","Mechanism"],
    ["HDFS","DataNode failure","Replication + rack awareness; NameNode re-replicates lost blocks"],
    ["HDFS","NameNode failure","HA (Active/Standby) with ZooKeeper failover"],
    ["MapReduce","Task failure","Master re-executes task on another node"],
    ["MapReduce","Slow task","Speculative execution (duplicate, use fastest)"],
    ["YARN","Container failure","AM retries (default 4 attempts)"],
    ["YARN","Node Manager failure","RM blacklists node; reschedules containers"],
    ["YARN","AM failure","RM restarts AM in new container"],
    ["YARN","RM failure","ZooKeeper triggers failover to Standby RM"],
    ["Spark","Partition loss","Recompute from LINEAGE GRAPH (no replication)"],
    ["Spark","Slow task","Speculative execution"]
  ] },

// EXPLAIN
{ lec:"L8", type:"EXPLAIN", q:"Explain WHY DataFrames are preferred over RDDs.",
  answer:"DataFrames are one step ahead of RDDs (higher-level abstraction).\n\nWHY:\n1. Schema awareness — RDD is a collection of generic objects; DataFrame is a distributed TABLE with named columns and types. This structured view lets Spark 'peek' into data and apply optimizations impossible with the 'black box' nature of RDDs.\n\n2. 'What' vs 'How' — DataFrames enable developers to focus on WHAT to process instead of HOW (low-level programming).\n\n3. Two critical low-level enhancements:\n   a. Custom Memory Management (Project Tungsten): reduces RAM and GC overhead.\n   b. Optimized Execution Plans (Catalyst Optimizer): automatically determines fastest way to run query.\n\nBoth DataFrame and RDD share: In-Memory, Resilient (lineage), Distributed, Immutable.\n\nThe difference: DataFrames add SCHEMA → enabling AUTOMATIC optimization, CONCISE syntax, and HIGHER performance. RDDs require manual tuning." },

{ lec:"L8", type:"EXPLAIN", q:"Explain the Catalyst Optimizer's pipeline (4 phases).",
  answer:"Catalyst Optimizer = core engine powering Spark SQL query optimization. Built using functional programming principles in Scala; uses immutable data structures and pattern matching. Operates on a TREE representation of queries.\n\n4 PHASES:\n\n1. QUERY ANALYSIS:\n• Resolve tables & columns (verify names exist, types match).\n\n2. LOGICAL OPTIMIZATION (Rule-Based):\n• Predicate pushdown — push filters near data source.\n• Column pruning — load only needed columns.\n• Constant folding — pre-compute constants.\n\n3. PHYSICAL PLANNING (Cost-Based):\n• Generate multiple physical plans.\n• Choose best plan using statistics (cost-based).\n• Picks join strategy (broadcast vs shuffle).\n\n4. CODE GENERATION:\n• Convert plan to optimized bytecode (Whole-Stage Code Generation).\n\nOUTPUT: Efficient execution plan.\n\nOPTIMIZATION TYPES:\n• Rule-Based (RBO): deterministic rewrite rules.\n• Cost-Based (CBO): uses statistics (row counts, sizes) to choose efficient plan." },

{ lec:"L8", type:"EXPLAIN", q:"Explain the 3 logical plan optimizations: Predicate Pushdown, Column Pruning, and Join Optimization.",
  answer:"1. PREDICATE PUSHDOWN:\n• Moves filtering as close to the data source as possible.\n• Removes irrelevant rows early.\n• Example: 'SELECT * WHERE country = Egypt' → Spark filters BEFORE loading fully into memory.\n• Benefits: reduces data scanned from storage, less disk I/O, faster query start.\n\n2. COLUMN PRUNING:\n• Loads only required columns, not full table.\n• Example: If query needs product_id, price → Spark does NOT load customer_name, address, timestamps.\n• Benefits: less memory, faster serialization/deserialization, reduced network transfer.\n\n3. JOIN OPTIMIZATION STRATEGY:\n• Spark chooses best join method based on data size:\n  - Broadcast Join → small table sent to all nodes (no shuffle)\n  - Shuffle Hash Join → partition-based join\n  - Sort Merge Join → for large sorted datasets\n• Benefits: avoids expensive shuffling, reduces network overhead, speeds up distributed joins." },

// SCENARIO
{ lec:"L8", type:"SCENARIO", q:"Scenario: You write 'spark.table(sales).filter(country==Egypt).select(product_id, price)'. Walk through how Catalyst optimizes this query.",
  answer:"1. QUERY ANALYSIS: Catalyst resolves 'sales' table, verifies columns (country, product_id, price) exist.\n\n2. LOGICAL OPTIMIZATION (Rule-Based):\n  - PREDICATE PUSHDOWN: pushes filter 'country=Egypt' down to the data source (e.g., Parquet/HDFS scan). Instead of loading all sales and filtering, Spark uses Parquet's built-in filter to skip irrelevant data.\n  - COLUMN PRUNING: only loads 'country' (for filter) + 'product_id' + 'price' columns. Skips customer_name, address, timestamps, etc.\n\n3. PHYSICAL PLANNING (Cost-Based):\n  - Catalyst chooses a physical plan that uses partition pruning if the table is partitioned by country.\n\n4. CODE GENERATION:\n  - Plan compiled into optimized bytecode.\n\n5. EXECUTION:\n  - DAG Scheduler creates Stages (no shuffle here → single stage).\n  - Task Scheduler assigns tasks to Executors.\n  - Executors read minimal data, filter, project → return result.\n\nResult: massive reduction in I/O vs. naive 'read all, filter later'." },

// EXPLAIN
{ lec:"L9", type:"EXPLAIN", q:"Explain WHY distributed analytics is needed.",
  answer:"THE DATA EXPLOSION PROBLEM:\n• Data is no longer small or static.\n• Scale increases rapidly: GB → TB → PB and beyond.\n• Data from: social media, sensors, IoT, logs, transactions.\n• Data is not only LARGE — it's also highly CONNECTED (graphs).\n\nTRADITIONAL ML / SINGLE MACHINE FAILS BECAUSE:\n• Memory limits: data cannot fit in RAM → frequent disk I/O.\n• CPU limits: training becomes extremely slow.\n• No parallelism: work processed sequentially.\n\nHOW DISTRIBUTED SYSTEMS SOLVE THIS:\n• Split data (tabular or graph) across machines → parallel processing.\n• Process data simultaneously.\n• Bring computation closer to data (data locality).\n• Scale horizontally (add more nodes).\n• Support iterative algorithms (ML or Graph) efficiently.\n\nKey insight: At scale, performance is no longer about better algorithms — it's about DISTRIBUTED COMPUTATION." },

{ lec:"L9", type:"EXPLAIN", q:"Explain the Spark MLlib pipeline architecture and workflow.",
  answer:"A Pipeline = sequence of STAGES run in order, each performing a transformation or model training step.\n\nSpark MLlib uses pipeline architecture designed for distributed data. Provides uniform high-level APIs built on DataFrames.\n\nPIPELINE consists of TRANSFORMERS and/or ESTIMATORS:\n• Transformer: implements .transform(); DataFrame → DataFrame.\n• Estimator: implements .fit(); fits a model on data. Estimators produce models (which are Transformers).\n\nWhen Pipeline.fit() is called:\n• Stages run in specified order.\n• If stage is a Transformer → .transform() is called.\n• If stage is an Estimator → .fit() is called.\n• Result: PipelineModel — all estimators replaced by the transformers they produced.\n\nPIPELINE STAGES:\n1. Data Input — load from CSV, Parquet, Hive into a DataFrame.\n2. Feature Engineering — convert raw data to numerical features.\n3. Model Training — fit ML model (Logistic Regression, Decision Tree).\n4. Evaluation — assess performance (accuracy, precision, recall).\n5. Prediction — apply trained model to new data for inference.\n\nResult: reusable, modular workflow Spark executes in sequence." },

{ lec:"L9", type:"EXPLAIN", q:"Explain how Spark parallelizes Gradient Descent (GD) and SGD.",
  answer:"GD and SGD are distributed optimization algorithms in Spark MLlib. They minimize a loss function by iteratively updating model weights across a cluster.\n\nMASTER-WORKER ARCHITECTURE:\n• Driver (Master): initializes weights, broadcasts to workers, aggregates gradients.\n• Executors (Workers): store partitions of dataset (RDDs), compute local gradients, send back.\n\nSTEPS:\n1. INITIALIZATION: driver initializes w_0 (random or zero). Data partitioned across workers as RDDs.\n2. BROADCAST WEIGHTS (iteration t): driver broadcasts w_t to all executors. Ensures all workers use same model version.\n3. PARALLEL GRADIENT COMPUTATION:\n  - GD: each worker uses ENTIRE local partition.\n  - SGD: each worker samples a SMALL SUBSET of its local partition.\n  - Workers compute partial gradients based on their data + current weights.\n4. AGGREGATION: workers use treeAggregate to efficiently SUM local gradients.\n5. UPDATE WEIGHTS: driver averages aggregated gradients and updates global weights using learning rate.\n6. ITERATE: steps 2–5 repeat until convergence (minimal loss change or max iterations).\n\nResponsibilities:\n• Steps 1-2: Driver\n• Step 3: Executors\n• Step 4: Driver + Executors\n• Steps 5-6: Driver" },

{ lec:"L9", type:"EXPLAIN", q:"Explain WHY GraphX uses Vertex-Cut partitioning.",
  answer:"GraphX uses Vertex-Cut for these reasons:\n\n1. LOAD BALANCING:\n• High-degree nodes (hubs) are SPLIT across machines.\n• Work is evenly distributed.\n• No single executor becomes a hotspot.\n\n2. PARALLELISM BOOST:\n• More partitions can process edges simultaneously.\n• Better CPU utilization.\n\n3. REDUCED STRAGGLERS:\n• Avoids slow tasks caused by overloaded partitions.\n• More predictable execution time.\n\n4. OPTIMIZED FOR ITERATIVE COMPUTATION:\n• GraphX caches structure.\n• Only vertex values are updated per iteration.\n\nWHY NOT EDGE-CUT?\n• Real-world graphs (social networks, web graphs) have power-law degree distribution: a few hub vertices with MANY connections.\n• Edge-Cut places entire vertex in one partition → hubs overload one machine.\n• Causes data skew, poor parallelism, computation bottlenecks.\n\nTrade-off: Vertex-Cut trades extra memory + synchronization for massive gains in parallelism and load balancing." },

{ lec:"L9", type:"EXPLAIN", q:"Explain the distributed PageRank algorithm in Spark.",
  answer:"PageRank assigns a score to each node reflecting its relative importance. Core idea: a node is important if other important nodes link to it.\n\nDISTRIBUTED ALGORITHM:\n\nINITIALIZATION:\n• Assign each vertex an initial rank (usually 1 or 1/N where N = total vertices).\n\nMAIN ITERATION (repeated until convergence):\n\n1. MAP PHASE — Local Contribution Calculation:\n  - For each edge u → v, calculate contribution = PR(u) / outdegree(u).\n  - Emit message (v, contribution).\n\n2. SHUFFLE PHASE — Message Exchange:\n  - Messages routed across cluster so all contributions for vertex v arrive at the node(s) holding v.\n  - Routing table ensures replicated vertices receive consistent updates.\n\n3. REDUCE PHASE — Aggregation:\n  - For each vertex, aggregate inbound contributions and update its PageRank.\n  - PR(v) = (1-d)/N + d × Σ contributions.\n\n4. BROADCAST:\n  - New ranks broadcast to all nodes holding replicas.\n\nSTOPPING: when ranks converge (changes < tolerance) or after fixed number of iterations.\n\nResult: PageRank is a probability distribution (0 → 1)." },

{ lec:"L9", type:"SCENARIO", q:"Scenario: A 2-partition dataset with Age vs Label. Node A has: Young(0Y,2N), Middle(2Y,0N), Old(1Y,0N). Node B has: Young(1Y,0N), Middle(0Y,1N), Old(2Y,1N). Compute the GLOBAL aggregation after shuffle for evaluating splits.",
  answer:"From Node A:\n• Young → (0 Yes, 2 No)\n• Middle → (2 Yes, 0 No)\n• Old → (1 Yes, 0 No)\n\nFrom Node B:\n• Young → (1 Yes, 0 No)\n• Middle → (0 Yes, 1 No)\n• Old → (2 Yes, 1 No)\n\nAFTER SHUFFLE (Global Aggregation):\n• Young → (1 Yes, 2 No)\n• Middle → (2 Yes, 1 No)\n• Old → (3 Yes, 1 No)\n\nDriver now computes Gini impurity for the root using global counts:\n• Total Yes = 6, Total No = 4 (out of 10)\n• Then evaluate each split (e.g., 'Age=Young vs Others'):\n  - Left (Young): (1, 2) → 3 samples → Gini computed\n  - Right (Others): (5, 2) → 7 samples → Gini computed\n  - Weighted Gini score compared with root.\n• Repeat for all candidate splits; choose split with lowest weighted Gini." },

// EXPLAIN
{ lec:"L10", type:"EXPLAIN", q:"Explain WHY we need streaming over batch processing.",
  answer:"BATCH PROCESSING limitations:\n• High latency (minutes → hours).\n• Cannot react to events instantly.\n• Misses real-time insights.\n\nBENEFITS OF STREAMING:\n• Real-time decision making.\n• Immediate insights.\n• Faster response to events.\n• Handles continuous data growth.\n\nUSE CASES:\n• User clicks on website (web analytics).\n• Banking transactions (fraud detection).\n• GPS updates from ride apps.\n• Sensor/IoT data.\n• Server log files.\n• Social media activities.\n\nKey insight: Real-time systems don't wait for data to accumulate — they react INSTANTLY. In a competitive world, the value of data decays rapidly; processing it in real-time captures business value that batch processing would miss." },

{ lec:"L10", type:"EXPLAIN", q:"Explain Kafka's core concepts: Producer, Consumer, Topic, Broker, Cluster, ZooKeeper, Partitions.",
  answer:"PRODUCER:\n• Sends data (messages) to Kafka brokers.\n• Automatically detects available brokers, routes messages.\n• Continuously sends at broker speed; no ACK by default.\n\nCONSUMER:\n• Reads/processes messages from topics.\n• Subscribes to topics; fetches from brokers.\n• Handles data in real-time or stores for downstream systems.\n\nTOPIC:\n• Logical channel where producers publish, consumers read.\n• Each topic = specific category of data.\n• Uniquely named within a Kafka cluster.\n• Messages are immutable once published.\n\nBROKER:\n• Server that stores and manages streaming data.\n• Handles writes (producers) and reads (consumers).\n• Multiple brokers form a cluster.\n\nCLUSTER:\n• Group of brokers working together.\n• Provides scalability, load balancing, fault tolerance.\n\nZOOKEEPER:\n• Manages and coordinates brokers in cluster.\n• Tracks broker availability.\n• Notifies producers/consumers when broker joins/fails.\n• Producers/consumers automatically switch to healthy brokers.\n\nPARTITIONS:\n• Topics are divided into partitions; multiple per topic per broker.\n• Roles: Leader (handles read/write) and Replica (backup).\n• If leader fails, replica auto-promoted.\n• Ordered, append-only.\n• Enable parallel consumption + scalability." },

{ lec:"L10", type:"EXPLAIN", q:"Explain Spark Streaming's two models: DStream vs Structured Streaming.",
  answer:"1. DSTREAM (Discretized Stream) — Spark 1.x:\n• Original streaming engine.\n• Processes streaming data as continuous sequence of small RDDs.\n• Micro-batch model: incoming data split into time-based batches; each batch processed as RDD.\n• Execution flow: Data arrives continuously → Spark chops into batches → processes each as RDD → outputs continuously.\n• Can be created from input sources (Kafka, Flume, Twitter) or other DStreams.\n• Operates on mini-batches.\n• Supports windowing and stateful computations.\n• Requires explicit schema management.\n• Built on RDDs + Spark's core execution engine.\n\n2. STRUCTURED STREAMING — Spark 2.x:\n• High-level DataFrame/Dataset API for streaming.\n• Treats live data stream as an APPEND-ONLY TABLE updated in real-time.\n• A query runs on the Input Table to produce a Result Table.\n• New data appended at each trigger interval; system incrementally updates Result Table.\n• Only updated results written to output sink.\n• Built on SQL engine for better optimization.\n• Uses SAME APIs as batch (no new paradigm).\n• Continuous processing model.\n• Built-in windowing/aggregation support." },

{ lec:"L10", type:"EXPLAIN", q:"Explain the three Output Modes in Structured Streaming.",
  answer:"Output Modes determine what data is written to the external sink (storage):\n\n1. COMPLETE MODE:\n• Writes the ENTIRE Result Table every trigger.\n• Used when full results are needed (e.g., aggregations).\n• Example: running total counts → write all counts every batch.\n\n2. APPEND MODE:\n• Writes only NEW ROWS since last trigger.\n• Works when data is only added (no updates).\n• Example: appending raw events to a log.\n\n3. UPDATE MODE:\n• Writes only CHANGED ROWS since last trigger.\n• Efficient for incremental updates.\n• Example: only emit the rows whose aggregated value changed.\n\nChoice depends on the type of query: aggregations → Complete; raw event streams → Append; incremental updates → Update." },

{ lec:"L10", type:"EXPLAIN", q:"Explain Event-Time Windowing and Watermarking in Structured Streaming.",
  answer:"EVENT-TIME WINDOW OPERATIONS:\n• Streaming data includes a timestamp (event time).\n• Data is GROUPED into time windows (e.g., last 10 seconds) instead of individual rows.\n• Each window acts like a group for aggregation.\n• Data is grouped by Window (time range).\n\nHANDLING LATE DATA:\n• Events may arrive late (generated at 12:04 but arrives at 12:11).\n• Spark still updates the correct past window using EVENT TIME, not arrival time.\n\nWATERMARKING (State Control):\n• Keeps system from storing data forever (memory management).\n• Defines how to handle late data.\n• Late data WITHIN threshold → processed.\n• Late data TOO LATE → dropped.\n\nTYPES OF TIME WINDOWS:\n1. Tumbling Windows: fixed-sized, non-overlapping, contiguous time intervals.\n2. Sliding Windows: fixed-sized, but CAN overlap (if slide duration < window duration).\n3. Session Windows: dynamic size — starts with an input, expands if next input arrives within gap duration." },

{ lec:"L10", type:"SCENARIO", q:"Scenario: Design a Real-Time Ride-Booking Analytics System using Kafka + Spark Streaming.",
  answer:"SYSTEM COMPONENTS:\n\n1. PRODUCER (Driver application):\nEach driver sends events:\n{ driver_id, location, timestamp, status (available/busy) }\n\nwhile True:\n  event = generate_driver_event()\n  kafka.send(topic='driver_events', value=event)\n\n2. INGESTION LAYER (Kafka Cluster):\n• Topic: driver_events\n• Partitioned by: driver_id (parallel consumption)\n• Brokers store events; ZooKeeper manages availability.\n\n3. CONSUMER (Spark Streaming):\n• Read stream:\n  df = spark.readStream.format('kafka').option('subscribe','driver_events').load()\n• Stateless processing — filter active drivers:\n  active_drivers = df.filter(status == 'available')\n• Stateful processing — count drivers per area every 10 minutes:\n  df.groupBy(window(timestamp, '10 minutes'), location).count()\n\n4. OUTPUT SINK:\n• Dashboards (live driver map).\n• Alerts (areas with low driver density).\n\nFLOW: Kafka moves data → Spark analyzes it." },

{ lec:"L10", type:"SCENARIO", q:"Scenario: Design a Real-Time Fraud Detection System using Spark + Kafka.",
  answer:"SYSTEM GOALS:\n• Learn normal vs abnormal patterns (batch ML).\n• Process live transactions (streaming).\n• Flag anomalies dynamically.\n\nARCHITECTURE:\n\n1. BATCH ML COMPONENT:\n• Train anomaly detection model on HISTORICAL transactions.\n• Learn what 'normal' looks like.\n• Store model for streaming pipeline.\n\n2. STREAMING COMPONENT:\nEach transaction sent as JSON from producer:\n{ user_id, transaction_id, amount, location, device_type, timestamp }\n\n3. SPARK PROCESSING LAYERS:\n• Input Layer: Spark reads Kafka messages; parses JSON; extracts fields.\n• Processing Layer: applies stateless + stateful operations.\n• Output Layer: sends results to alerts, dashboards, or Kafka alert topic.\n\n4. METRICS:\n• Transaction Amount Validation (Stateless): df.filter(amount > 0 && amount < 10000)\n• Device Type Check (Stateless): df.filter(device_type isin 'mobile','web','pos')\n• Average Amount per user (Stateful, 30s window): df.groupBy(window(timestamp,'30s'), user_id).agg(avg(amount))\n• Transaction Count per Location (Stateful, sliding window 30s/10s): df.groupBy(window(timestamp,'30s','10s'), location).agg(count(transaction_id))\n\n5. ALERT GENERATION: anomaly score > threshold → emit alert to dashboard/Kafka alert topic." },

// EXPLAIN
{ lec:"L11", type:"EXPLAIN", q:"Explain Data Warehouse: storage approach, strengths, and limitations.",
  answer:"DATA WAREHOUSE:\n• Stores STRUCTURED data.\n• Schema-on-Write (schema defined BEFORE storage).\n• ETL pipeline (Extract, Transform, Load) → data cleaned/validated before entering.\n• Optimized for SQL queries.\n\nSTRENGTHS:\n• Fast queries (highly optimized).\n• High reliability.\n• Strong governance (clean, validated data).\n\nLIMITATIONS:\n• Rigid schema — everything must fit the schema before entering.\n• Not suitable for raw/unstructured data.\n• Expensive storage.\n\nArchitecture: Data is CLEANED before storage → stored in structured tables → accessed via SQL.\n\nKey insight: Warehouses are CLEAN but INFLEXIBLE." },

{ lec:"L11", type:"EXPLAIN", q:"Explain Data Lake: storage approach, strengths, and limitations.",
  answer:"DATA LAKE:\n• Stores RAW data in ORIGINAL format.\n• Schema-on-Read.\n• Supports: Structured (CSV), Semi-structured (JSON), Unstructured (images, videos).\n\nSTRENGTHS:\n• Flexible.\n• Cheap storage.\n• Ideal for ML (raw data, diverse formats).\n\nLIMITATIONS:\n• Poor data quality and reliability.\n• Hard to manage.\n• Difficult analytics.\n\nPhilosophy: 'Don't worry about structure now — store everything, analyze later.'\n\nKey insight: Lakes are FLEXIBLE but MESSY. Risk becoming 'data swamps' without governance." },

{ lec:"L11", type:"EXPLAIN", q:"Explain Lakehouse: what it is, what it combines, and why it matters.",
  answer:"LAKEHOUSE combines:\n• Data Lake ('cheap storage for everything').\n• Data Warehouse ('clean, structured, fast analytics').\n\nKEY FEATURES:\n• ACID transactions.\n• Schema enforcement.\n• Unified analytics (BI + ML on same data).\n\nKEY INNOVATION: 'Table Layer' added on top of Data Lake:\n• Software layer that organizes raw files into reliable analytical tables.\n• Acts as: database interface, metadata manager, transaction manager.\n• Organizes files logically into tables WITHOUT moving everything into a traditional DB.\n\nTABLE LAYER CAPABILITIES:\n1. Transaction logs → ACID guarantees.\n2. Metadata management.\n3. Schema evolution → add columns without rewriting.\n4. Time travel → access any previous data version.\n5. Partition pruning → skip irrelevant files in queries.\n\nWHY LAKEHOUSE MATTERS:\nEliminates:\n• Data duplication.\n• Complex pipelines (moving data between Lake and Warehouse).\n\nEnables:\n• BI + ML on SAME data.\n• Single source of truth.\n\nPhysical storage: still a Data Lake (files in Parquet/JSON/CSV on S3, Azure Data Lake Storage, HDFS). The Table Layer adds structure and transactions on top." },

{ lec:"L11", type:"EXPLAIN", q:"Explain WHEN to use Data Warehouse, Data Lake, or Lakehouse.",
  answer:"DATA WAREHOUSE — use when:\n• You have STRUCTURED data only.\n• You need FAST SQL queries.\n• You require HIGH RELIABILITY and STRONG GOVERNANCE.\n• Use cases: BI dashboards, traditional analytics, financial reporting.\n• Examples: Amazon Redshift, Azure Synapse, Google BigQuery.\n\nDATA LAKE — use when:\n• You have DIVERSE data (structured + semi + unstructured).\n• You need CHEAP storage at SCALE.\n• ML workloads need RAW data access.\n• Schema may evolve over time.\n• Use cases: data science, ML training, exploratory analytics.\n• Examples: Amazon S3, Azure Data Lake Storage Gen2, GCS.\n\nLAKEHOUSE — use when:\n• You want BOTH the flexibility of a Lake AND the reliability of a Warehouse.\n• You need BI + ML on the SAME data.\n• You want to AVOID maintaining two separate systems.\n• ACID transactions and schema enforcement are needed.\n• Use cases: modern analytics, unified data platforms.\n• Examples: Azure Databricks (Delta Lake), Microsoft Fabric, BigLake + BigQuery." },

{ lec:"L11", type:"SCENARIO", q:"Scenario: Your company stores TBs of structured sales data, JSON event logs, and product images. You need both BI dashboards and ML model training. Which architecture should you choose and why?",
  answer:"RECOMMENDATION: LAKEHOUSE.\n\nWHY:\n1. Diverse data types — structured sales, semi-structured JSON, unstructured images → Lake's flexibility needed.\n2. BI dashboards on same data — need Warehouse-like reliability, schema enforcement, fast SQL.\n3. ML training requires raw data access — Lake provides this.\n4. Avoid duplicating data across separate Warehouse + Lake systems.\n\nIMPLEMENTATION:\n• Storage: cloud Lake (S3/ADLS/GCS) for raw files (Parquet, JSON, image files).\n• Table Layer: Delta Lake, Apache Iceberg, or Apache Hudi → adds ACID transactions, schema enforcement, time travel.\n• Compute: Spark for both batch analytics and ML training.\n• BI: SQL queries via Spark SQL / Athena / BigQuery against Lakehouse tables.\n• ML: MLlib pipelines reading from the same tables.\n\nCONCRETE CLOUD OPTIONS:\n• Azure: Azure Databricks (Delta Lake) + Microsoft Fabric.\n• AWS: S3 + Lake Formation + Athena + EMR.\n• GCP: BigLake + BigQuery.\n\nResult: ONE platform for BI + ML; lower cost than separate Warehouse + Lake; ACID guarantees." },

{ lec:"L11", type:"SCENARIO", q:"Scenario: Map all the Big Data technologies learned in the course to their roles in a real-world system.",
  answer:"COMPLETE REAL-WORLD BIG DATA STACK:\n\n• Hadoop HDFS → DISTRIBUTED STORAGE: stores massive datasets reliably across commodity hardware.\n\n• YARN → CLUSTER RESOURCE MANAGEMENT: allocates CPU/memory; supports multi-tenancy (Spark, MR, Flink).\n\n• MapReduce → LEGACY BATCH PROCESSING: rarely used for new workloads; foundational concept.\n\n• Spark RDDs → DISTRIBUTED COMPUTATION: low-level, flexible, for custom algorithms.\n\n• Spark DataFrames → STRUCTURED ANALYTICS: optimized via Catalyst; SQL-like operations, ETL.\n\n• Spark Streaming → REAL-TIME PROCESSING: micro-batch (DStream) or continuous (Structured Streaming).\n\n• Kafka → STREAMING INGESTION BACKBONE: collects, buffers, distributes real-time event data.\n\nLAYERED ARCHITECTURE:\n1. INGESTION: Kafka (streaming) + Sqoop (batch from RDBMS) + Flume (log ingestion).\n2. STORAGE: HDFS, S3, Azure Data Lake (Lake/Lakehouse).\n3. RESOURCE MGMT: YARN, Kubernetes.\n4. PROCESSING: Spark (batch + streaming + ML + graph).\n5. ANALYTICS: BI tools, ML models, dashboards.\n\nKEY INSIGHT: Real companies don't use a single tool. They build LAYERED architectures where each technology solves a specific problem." },

let userAnswers = {};

let mcqCorrect = 0;
let currentLecFilter = "all";
let currentTypeFilter = "all";

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function render() {
  container.innerHTML = "";
  const grouped = {};
  questions.forEach((q, i) => {
    if (currentLecFilter !== "all" && q.lec !== currentLecFilter) return;
    if (currentTypeFilter !== "all" && q.type !== currentTypeFilter) return;
    if (!grouped[q.lec]) grouped[q.lec] = [];
    grouped[q.lec].push({ ...q, idx: i });
  });

  if (Object.keys(grouped).length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#7f8c8d;padding:40px;">No questions match filter.</p>';
    return;
  }

  Object.keys(grouped).forEach(lec => {
    const section = document.createElement('div');
    section.className = 'lecture-section';
    section.innerHTML = `<div class="lecture-title">${lectureNames[lec] || lec}</div>`;
    grouped[lec].forEach((q, n) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question';
      qDiv.dataset.idx = q.idx;
      const qNum = n + 1;
      const typeTag = `<span class="qtype-tag qtype-${q.type}">${q.type}</span>`;
      let body = '';
      if (q.type === 'MCQ') {
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <ul class="options" data-idx="${q.idx}">
            ${q.options.map((opt, i) => `<li data-opt="${i}">${String.fromCharCode(65+i)}) ${escapeHtml(opt)}</li>`).join('')}
          </ul>
          <div class="explanation" id="exp-${q.idx}"><strong>Explanation:</strong> ${escapeHtml(q.exp || '')}</div>
        `;
      } else if (q.type === 'TF') {
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <ul class="options" data-idx="${q.idx}">
            <li data-opt="TRUE">TRUE</li>
            <li data-opt="FALSE">FALSE</li>
          </ul>
          <div class="explanation" id="exp-${q.idx}"><strong>Answer: ${q.answer}.</strong> ${escapeHtml(q.exp || '')}</div>
        `;
      } else if (q.type === 'EXPLAIN') {
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <textarea placeholder="Type your answer here..."></textarea>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Model Answer</button>
          <div class="answer-box" id="ans-${q.idx}"><strong>Model Answer:</strong>\n${escapeHtml(q.answer)}</div>
        `;
      } else if (q.type === 'DIFF') {
        let table = '<table class="compare-table"><thead><tr>';
        q.answer[0].forEach(h => table += `<th>${escapeHtml(h)}</th>`);
        table += '</tr></thead><tbody>';
        for (let r = 1; r < q.answer.length; r++) {
          table += '<tr>';
          q.answer[r].forEach(cell => table += `<td>${escapeHtml(cell)}</td>`);
          table += '</tr>';
        }
        table += '</tbody></table>';
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <p class="hint">Think through your answer before revealing the comparison table.</p>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Comparison</button>
          <div class="answer-box" id="ans-${q.idx}">${table}</div>
        `;
      } else if (q.type === 'FILL') {
        const blankCount = q.blanks.length;
        let inputs = '';
        for (let i = 0; i < blankCount; i++) {
          inputs += `<input type="text" class="fill-blank-input" placeholder="blank ${i+1}" />`;
        }
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <div>${inputs}</div>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Answers</button>
          <div class="answer-box" id="ans-${q.idx}"><strong>Answers:</strong> ${q.blanks.map(b => '"' + escapeHtml(b) + '"').join(', ')}.\n${escapeHtml(q.exp || '')}</div>
        `;
      } else if (q.type === 'FLOW') {
        let stepsHtml = '';
        q.answer.forEach((s, i) => {
          stepsHtml += `<div class="flow-step"><strong>${i+1}.</strong> ${escapeHtml(s)}</div>`;
        });
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <textarea placeholder="Walk through the steps before revealing..." style="min-height:80px"></textarea>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Flow</button>
          <div class="answer-box" id="ans-${q.idx}">${stepsHtml}</div>
        `;
      } else if (q.type === 'SCENARIO') {
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <textarea placeholder="Work through your scenario answer..." style="min-height:90px"></textarea>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Solution</button>
          <div class="answer-box" id="ans-${q.idx}"><strong>Solution:</strong>\n${escapeHtml(q.answer)}</div>
        `;
      } else if (q.type === 'MATCH') {
        let leftItems = q.pairs.map(p => `<li>${escapeHtml(p[0])}</li>`).join('');
        let rightItems = q.pairs.map(p => `<li>${escapeHtml(p[1])}</li>`).join('');
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <div style="display:flex;gap:30px;margin:10px 0;">
            <div><strong>Items:</strong><ul class="bullet-list">${leftItems}</ul></div>
            <div><strong>Definitions (shuffled):</strong><ul class="bullet-list">${rightItems}</ul></div>
          </div>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Matches</button>
          <div class="answer-box" id="ans-${q.idx}"><strong>Correct Matches:</strong>\n${q.pairs.map(p => '• ' + escapeHtml(p[0]) + ' → ' + escapeHtml(p[1])).join('\n')}\n\n${escapeHtml(q.exp || '')}</div>
        `;
      } else if (q.type === 'ARCH') {
        body = `
          <div class="question-text">${typeTag}<span class="q-num">Q${qNum}.</span>${escapeHtml(q.q)}</div>
          <textarea placeholder="Describe the architecture (components + relationships + flow)..." style="min-height:120px"></textarea>
          <button class="reveal-btn-small" onclick="toggleAnswer('${q.idx}')">Show Full Description</button>
          <div class="answer-box" id="ans-${q.idx}"><strong>Architecture:</strong>\n${escapeHtml(q.answer)}</div>
        `;
      }
      qDiv.innerHTML = body;
      section.appendChild(qDiv);
    });
    container.appendChild(section);
  });

  // attach MCQ/TF handlers
  document.querySelectorAll('.options').forEach(ul => {
    const idx = parseInt(ul.dataset.idx);
    ul.querySelectorAll('li').forEach(li => {
      li.addEventListener('click', () => {
        const optAttr = li.dataset.opt;
        const opt = (questions[idx].type === 'TF') ? optAttr : parseInt(optAttr);
        handleAnswer(idx, opt, ul);
      });
    });
  });
  // restore
  Object.keys(userAnswers).forEach(idx => {
    const ans = userAnswers[idx];
    const ul = document.querySelector(`.options[data-idx="${idx}"]`);
    if (ul) showResult(ul, parseInt(idx), ans);
  });

  updateScore();
}

function handleAnswer(idx, opt, ul) {
  if (userAnswers[idx] !== undefined) return;
  userAnswers[idx] = opt;
  const q = questions[idx];
  mcqAnswered++;
  const correct = (q.type === 'TF') ? (opt === q.answer) : (opt === q.answer);
  if (correct) mcqCorrect++;
  showResult(ul, idx, opt);
  updateScore();
}

function showResult(ul, idx, opt) {
  const q = questions[idx];
  ul.querySelectorAll('li').forEach((li, i) => {
    li.classList.add('disabled');
    const itemKey = (q.type === 'TF') ? li.dataset.opt : i;
    const correctVal = q.answer;
    if (itemKey == correctVal) li.classList.add('correct');
    if (itemKey == opt && opt != correctVal) li.classList.add('wrong');
  });
  const exp = document.getElementById('exp-' + idx);
  if (exp) exp.classList.add('show');
}

function toggleAnswer(idx) {
  const a = document.getElementById('ans-' + idx);
  if (a) a.classList.toggle('show');
}

function updateScore() {
  const totalMcq = questions.filter(q => q.type === 'MCQ' || q.type === 'TF').length;
  document.getElementById('scoreBox').textContent = `MCQ/TF: ${mcqCorrect}/${mcqAnswered}  (Total: ${totalMcq})`;
  const pct = totalMcq > 0 ? (mcqAnswered / totalMcq) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetQuiz() {
  if (!confirm('Reset all answers?')) return;
  userAnswers = {};
  mcqAnswered = 0;
  mcqCorrect = 0;
  render();
}

function revealAll() {
  questions.forEach((q, i) => {
    if (q.type === 'MCQ' || q.type === 'TF') {
      if (userAnswers[i] === undefined) {
        const ul = document.querySelector(`.options[data-idx="${i}"]`);
        if (ul) {
          ul.querySelectorAll('li').forEach((li, j) => {
            li.classList.add('disabled');
            const itemKey = (q.type === 'TF') ? li.dataset.opt : j;
            if (itemKey == q.answer) li.classList.add('correct');
          });
          const exp = document.getElementById('exp-' + i);
          if (exp) exp.classList.add('show');
        }
      }
    } else {
      const a = document.getElementById('ans-' + i);
      if (a) a.classList.add('show');
    }
  });
}

document.querySelectorAll('[data-filter-lec]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter-lec]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLecFilter = btn.dataset.filterLec;
    render();
  });
});
document.querySelectorAll('[data-filter-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTypeFilter = btn.dataset.filterType;
    render();
  });
});

render();
</script>
</body>
</html>
